<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - Flower Shop</title>
    <link rel="stylesheet" href="success.css">
</head>
<body>
    <nav>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html ">Shop</a></li>
        <li><a href="index.html">Contact</a></li>
    </ul>
   </nav>
    <h1>Flower Shop</h1> 
  
   
        <div class="form-section">
            <form action="#" method="POST" class="checkout-form">
                
                <div class="form-group-section">
                    <h3><span class="icon"></span> عنوان الشحن</h3>
                    <div class="input-group">
                        <label>الاسم بالكامل</label>
                        <input type="text" placeholder="Your Name" required="">
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label>البريد الإلكتروني</label>
                            <input type="email" placeholder="example@mail.com" required="">
                        </div>
                        <div class="input-group">
                            <label>رقم الهاتف</label>
                            <input type="tel" placeholder="01xxxxxxxxx" required="">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>العنوان بالتفصيل</label>
                        <input type="text" placeholder="اسم الشارع، رقم المبنى، الشقة" required="">
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label>المدينة</label>
                            <input type="text" placeholder="القاهرة" required="">
                        </div>
                        <div class="input-group">
                            <label>الرقم البريدي (اختياري)</label>
                            <input type="text" placeholder="12345">
                        </div>
                    </div>
                </div>

                <div class="form-group-section">
                    <h3><span class="icon"></span> طريقة الدفع</h3>
                    <div class="payment-options">
                        <label class="payment-card">
                            <input type="radio" name="payment" value="cod" checked="">
                            <div class="payment-info">
                                <span>الدفع عند الاستلام (COD)</span>
                            </div>
                        </label>
                        <label class="payment-card">
                            <input type="radio" name="payment" value="card">
                            <div class="payment-info">
                                <span>بطاقة ائتمان / ميزة</span>
                            </div>
                        </label>
                    </div>

                    <div class="card-details-fields">
                        <div class="input-group">
                            <label>رقم البطاقة</label>
                            <input type="text" placeholder="0000 0000 0000 0000">
                        </div>
                        <div class="input-row">
                            <div class="input-group">
                                <label>تاريخ الانتهاء</label>
                                <input type="text" placeholder="MM/YY">
                            </div>
                            <div class="input-group">
                                <label>رمز الأمان (CVV)</label>
                                <input type="text" placeholder="123">
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn">تأكيد وطلب الأوردر</button>
            </form>
        </div>


</body>
</html>
